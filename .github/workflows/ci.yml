name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26"
          # vendor/ is committed; no module cache download needed.
          cache: false

      # Formatting must be clean. Any file that needs gofmt is a CI failure.
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { echo "The following files need gofmt:"; gofmt -l .; exit 1; }

      # Static analysis.
      - name: Vet
        run: go vet ./...

      # Unit tests
      - name: Test
        run: go test ./...

      # Build the standalone validator binary.
      - name: Build validator
        run: go build -o bin/validator ./cmd/validator

      # Smoke-test: every valid example must exit 0.
      - name: Validate valid examples
        run: |
          for f in \
            examples/microservices-basic.json \
            examples/microservices-full.json \
            examples/queue-basic.json \
            examples/external-api-basic.json; do
            echo "Validating $f ..."
            ./bin/validator "$f" || { echo "FAIL: $f should be valid"; exit 1; }
          done

      # Smoke-test: every invalid example must exit non-zero.
      - name: Reject invalid examples
        run: |
          for f in \
            examples/invalid-missing-fields.json \
            examples/invalid-bad-values.json; do
            echo "Expecting $f to be rejected ..."
            ./bin/validator "$f" && { echo "FAIL: $f should be invalid but validator exited 0"; exit 1; } || true
          done
          echo "All invalid examples correctly rejected."
